<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar | Ministry Connect</title>

  <style>
    :root {
      --navy:#16324f;
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --gold:#f2c94c;
      --bg:#eef3f8;
      --card:rgba(255,255,255,0.95);
      --text:#1f2937;
      --muted:#667085;
      --border:rgba(15,23,42,.1);
      --shadow:0 18px 45px rgba(16,24,40,.1);
      --radius:24px;
      --max:1100px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(44,123,229,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(31,182,170,.12), transparent 32%),
        linear-gradient(180deg,#eef3f9 0%,#f6f8fb 45%,#edf2f7 100%);
    }

    a{text-decoration:none;color:inherit}

    .wrap{width:min(var(--max),calc(100% - 32px));margin:0 auto}

    .topbar{
      position:sticky;
      top:0;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(0,0,0,.05);
      z-index:10;
    }

    .topbar-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:70px;
    }

    .brand{display:flex;gap:12px;align-items:center}

    .brand-mark{
      width:44px;height:44px;border-radius:12px;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;display:grid;place-items:center;font-weight:700;
    }

    .nav a{
      margin-left:10px;
      padding:10px 14px;
      border-radius:999px;
    }

    .nav a:hover{background:rgba(44,123,229,.08)}

    .hero{
      padding:40px 0 20px;
    }

    .hero-box{
      background:linear-gradient(135deg,#2c7be5,#1fb6aa);
      color:#fff;
      padding:40px;
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .hero h1{margin:0 0 10px;font-size:2.4rem}

    .hero p{margin:0;opacity:.95}

    .section{padding:20px 0}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
    }

    .calendar-wrap{
      margin-top:15px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.05);
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .btn{
      padding:10px 14px;
      border-radius:12px;
      font-weight:700;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-secondary{
      background:#e5e7eb;
    }

    @media(max-width:800px){
      .hero-box{padding:25px}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <div class="brand-mark">MC</div>
        <strong>Ministry Connect</strong>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="calendar.html">Calendar</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <section class="hero">
      <div class="hero-box">
        <h1>Church Calendar</h1>
        <p>View upcoming events and ministry schedules.</p>
      </div>
    </section>

    <section class="section">
      <div class="card">

        <div class="calendar-wrap">
          <script src="https://versaillesumc.churchcenter.com/assets/calendar_embed.js" data-height="auto"></script>
        </div>

        <div class="actions">
          <a href="https://versaillesumc.churchcenter.com/calendar" target="_blank" class="btn btn-secondary">
            Open Full Calendar
          </a>

          <a href="#" class="btn btn-primary">
            Add Event (Staff)
          </a>
        </div>

      </div>
    </section>

  </main>

</body>
</html>

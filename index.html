<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ministry Connect | VUMC Workspace</title>

  <style>
    :root {
      --navy:#16324f;
      --blue:#2c7be5;
      --teal:#1fb6aa;
      --gold:#f2c94c;
      --bg:#eef3f8;
      --card:rgba(255,255,255,0.95);
      --text:#1f2937;
      --muted:#667085;
      --border:rgba(15,23,42,.1);
      --shadow:0 18px 45px rgba(16,24,40,.1);
      --radius:24px;
      --max:1100px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(44,123,229,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(31,182,170,.12), transparent 32%),
        linear-gradient(180deg,#eef3f9 0%,#f6f8fb 45%,#edf2f7 100%);
    }

    a{text-decoration:none;color:inherit}

    .wrap{width:min(var(--max),calc(100% - 32px));margin:0 auto}

    .topbar{
      position:sticky;
      top:0;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(0,0,0,.05);
      z-index:10;
    }

    .topbar-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:70px;
    }

    .brand{display:flex;gap:12px;align-items:center}

    .brand-mark{
      width:44px;height:44px;border-radius:12px;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;display:grid;place-items:center;font-weight:700;
    }

    .brand-title{font-weight:700;color:var(--navy)}

    .nav a{
      margin-left:10px;
      padding:10px 14px;
      border-radius:999px;
    }

    .nav a:hover{background:rgba(44,123,229,.08)}

    .hero{
      padding:40px 0 20px;
    }

    .hero-box{
      background:linear-gradient(135deg,#2c7be5,#1fb6aa);
      color:#fff;
      padding:40px;
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .hero h1{margin:0 0 10px;font-size:2.5rem}

    .hero p{margin:0;opacity:.95}

    .section{padding:20px 0}

    .card-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:var(--shadow);
      transition:.2s ease;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card h3{margin:0 0 8px;color:var(--navy)}

    .card p{margin:0;color:var(--muted);font-size:.95rem}

    .card .link{
      margin-top:14px;
      display:inline-block;
      color:var(--blue);
      font-weight:700;
    }

    @media(max-width:900px){
      .card-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <div class="brand-mark">MC</div>
        <div class="brand-title">Ministry Connect</div>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="receipt.html">Receipt Tool</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <section class="hero">
      <div class="hero-box">
        <h1>Ministry Connect</h1>
        <p>Simple tools for the front office. Click a card below to get started.</p>
      </div>
    </section>

    <section class="section">
      <div class="card-grid">

        <!-- RECEIPT TOOL -->
        <a href="receipt.html" class="card">
          <h3>Donation / In-Kind Receipt</h3>
          <p>Create, email, and print donation receipts for office records.</p>
          <span class="link">Open tool →</span>
        </a>

        <!-- PLACEHOLDERS -->
        <div class="card">
          <h3>Attendance</h3>
          <p>Coming soon.</p>
        </div>

        <div class="card">
          <h3>People Search</h3>
          <p>Coming soon.</p>
        </div>

      </div>
    </section>

  </main>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>People Directory | Ministry Connect</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.wrap {
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.search {
  display:flex;
  gap:10px;
  background:#fff;
  padding:14px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.search input {
  flex:1;
  border:none;
  font-size:16px;
  outline:none;
}

.grid {
  margin-top:20px;
  display:grid;
  gap:12px;
}

.card {
  background:#fff;
  padding:14px;
  border-radius:14px;
  display:flex;
  gap:12px;
  align-items:center;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#2c7be5;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.name {
  font-weight:bold;
}

.muted {
  color:#666;
  font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">
  <h2>People Directory</h2>

  <div class="search">
    <input id="q" placeholder="Search name or email..." />
    <span id="status"></span>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="muted">Start typing to search...</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybKVCCW7_Yn2ieND2AfvTlUIb6q96YjWzuKYRMXegLhCFH_htIwMZnoDv47JY9dDIL/exec";

let timer;

function initials(name){
  return (name||"").split(" ").map(x=>x[0]).join("").toUpperCase();
}

async function search(q){
  document.getElementById("status").textContent = "Searching...";

  try{
    const url = SCRIPT_URL +
      "?action=searchPeople&q=" + encodeURIComponent(q);

    const res = await fetch(url);
    const text = await res.text();

    console.log("Response:", text);

    const data = JSON.parse(text);

    render(data);

  }catch(err){
    console.error(err);
    document.getElementById("empty").textContent = "Error loading results";
  }

  document.getElementById("status").textContent = "";
}

function render(data){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  grid.innerHTML = "";

  if(!data.rows || data.rows.length === 0){
    empty.style.display="block";
    empty.textContent="No results";
    return;
  }

  empty.style.display="none";

  data.rows.forEach(p=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="avatar">${initials(p.name)}</div>
      <div>
        <div class="name">${p.name}</div>
        <div class="muted">${p.email || ""}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

document.getElementById("q").addEventListener("input", function(e){
  const val = e.target.value.trim();

  clearTimeout(timer);

  if(val.length < 2){
    document.getElementById("grid").innerHTML="";
    document.getElementById("empty").style.display="block";
    return;
  }

  timer = setTimeout(()=>search(val), 300);
});
</script>

</body>
</html>
